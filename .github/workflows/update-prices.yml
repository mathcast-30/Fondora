name: Mise à jour des prix

on:
  schedule:
    - cron: "0 18 * * 1-5" # 18h UTC = 20h Paris, du lundi au vendredi
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler la fonction Supabase update-prices
        run: |
          curl -i --location --request POST "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/update-prices" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Content-Type: application/json"

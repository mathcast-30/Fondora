name: Mise à jour des prix

on:
  schedule:
    - cron: "0 18 * * 1-5" # 18h UTC = 20h Paris, du lundi au vendredi
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler la Edge Function Supabase
        run: |
          curl -X POST https://ptcdwzozambankspjwes.supabase.co/functions/v1/update-prices \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json"
